---
apiVersion: v1
kind: Service
metadata:
  annotations:
  labels:
    app.kubernetes.io/instance: woodpecker-ci
    app.kubernetes.io/name: server
  name: woodpecker-ci-server
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: http
  - name: grpc
    port: 9000
    protocol: TCP
    targetPort: grpc
  selector:
    app.kubernetes.io/instance: woodpecker-ci
    app.kubernetes.io/name: server
  sessionAffinity: None
  type: ClusterIP
