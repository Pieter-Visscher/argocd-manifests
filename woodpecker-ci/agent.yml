apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/instance: woodpecker-ci
    app.kubernetes.io/name: agent
  name: woodpecker-ci-agent
spec:
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  podManagementPolicy: OrderedReady
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: woodpecker-ci
      app.kubernetes.io/name: agent
  serviceName: woodpecker-ci-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: woodpecker-ci
        app.kubernetes.io/name: agent
    spec:
      containers:
      - env:
        - name: WOODPECKER_BACKEND
          value: kubernetes
        - name: WOODPECKER_BACKEND_K8S_NAMESPACE
          value: woodpecker
        - name: WOODPECKER_BACKEND_K8S_NAMESPACE_PER_ORGANIZATION
        - name: WOODPECKER_BACKEND_K8S_POD_ANNOTATIONS
        - name: WOODPECKER_BACKEND_K8S_POD_LABELS
        - name: WOODPECKER_BACKEND_K8S_STORAGE_CLASS
        - name: WOODPECKER_BACKEND_K8S_STORAGE_RWX
        - name: WOODPECKER_BACKEND_K8S_VOLUME_SIZE
          value: 10G
        - name: WOODPECKER_CONNECT_RETRY_COUNT
          value: "1"
        - name: WOODPECKER_SERVER
          value: woodpecker-ci-server:9000
        envFrom:
        - secretRef:
            name: woodpecker-default-agent-secret
        image: docker.io/woodpeckerci/woodpecker-agent:v3.13.0
        imagePullPolicy: IfNotPresent
        name: agent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        securityContext:
          runAsGroup: 1000
          runAsUser: 1000
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/woodpecker
          name: agent-config
        - name: cert
          mountPath: /usr/local/share/ca-certificates/nauvis.lan/ca.crt
          subPath: ca.crt
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        fsGroup: 1000
      serviceAccount: woodpecker-ci-agent
      serviceAccountName: woodpecker-ci-agent
      terminationGracePeriodSeconds: 30
      volumes:
        - name: cert
          secret:
            secretName: woodpecker-nauvis-lan-tls
            items:
            - key: ca.crt
              path: ca.crt
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
      partition: 0
    type: RollingUpdate
  volumeClaimTemplates:
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: agent-config
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      volumeMode: Filesystem
    status:
      phase: Pending
