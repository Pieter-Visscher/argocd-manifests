---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-svc
  labels:
    app: forgejo
spec:
  selector:
    app: forgejo
  ports:
  - name: ssh
    protocol: TCP
    port: 22
  - name: web
    protocol: TCP
    port: 443
    targetPort: 3000
  type: LoadBalancer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: nauvis-lan-cert-tls
spec:
  secretName: git-nauvis-lan-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
  - git.nauvis.lan
