---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policies
data:
  aap-policy.rego: |
    # --- AAP Validation Policy ---
    package aap_policy_examples

    import rego.v1

    # Default policy response
    default organization_inventory_validation := {
        "allowed": true,
        "violations": [],
    }

    # Validate that only "Default" can use "Demo Inventory"
    organization_inventory_validation := result if {
        inventory_name := object.get(input, ["inventory", "name"], "")
        org_name := object.get(input, ["organization", "name"], "")

        inventory_name == "Demo Inventory"
        org_name != "Default"

        result := {
            "allowed": false,
            "violations": ["Only the 'Default' organization should use the 'Demo Inventory' inventory"],
        }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-healthcheck-policies
data:
  healthcheck-policy.rego: |

    # --- Health Check Policy ---
    # This satisfies the "data.system.health" undefined errors
    package system.health

    default live := true
    default ready := true
---
