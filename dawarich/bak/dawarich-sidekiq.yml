---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-sidekiq-deployment
  labels:
    app.kubernetes.io/name: dawarich-sidekiq
    app.kubernetes.io/part-of: dawarich
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dawarich-sidekiq
      app.kubernetes.io/part-of: dawarich
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dawarich-sidekiq
        app.kubernetes.io/part-of: dawarich
    spec:
      containers:
        - name: dawarich
          image: freikin/dawarich:1.6.0
          args:
            - sidekiq
          command:
            - sidekiq-entrypoint.sh
          ports:
          - name: web
            containerPort: 3000
          - name: prometheus
            containerPort: 9394
          env:
          - name: RAILS_ENV
            value: production
          - name: REDIS_URL
            value: dawarich-svc-redis
          - name: DATABASE_HOST
            value: dawarich-svc-postgris
          - name: DATABASE_PORT
            value: 5432
          - name: DATABASE_USERNAME
            valueFrom:
              secretKeyRef:
                name: dawarich-secret-postgris
                key: POSTGRES_USER
          - name: DATABASE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: dawarich-secret-postgris
                key: POSTGRES_PASSWORD
          - name: DATABASE_NAME
            value: dawarich-svc-postgris
          - name: APPLICATION_HOSTS
            value: localhost,::1,127.0.0.1
          - name: TIMEZONE
            value: Europe/Amsterdam
          - name: APPLICATION_PROTOCOL
            value: http
          - name: PROMETHEUS_EXPORTER_ENABELD
            value: true
          - name: PROMETHEUS_EXPORTER_PORT
            value: 9394
          - name: SECRET_KEY_BASE
            secretKeyRef:
              name: dawarich-secret
              key: SECRET_KEY_BASE
          - name: RAILS_LOG_TO_STDOUT
            value: true
          - name: SELF_HOSTED
            value: true
          - name: STORE_GEODATA
            value: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - wget -qO - http://127.0.0.1:3000/api/v1/health | grep -q '\"status\"\\s*:\\s*\"ok\"'
            initialDelaySeconds: 30
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
          - name: storage
            mountPath: /var/app/storage
          - name: watched
            mountPath: /var/app/tmp/imports/watched
          - name: public
            mountPath: /var/app/public
      volumes:
        - name: watched
          persistentVolumeClaim:
            claimName: dawarich-pvc-watched
        - name: public
          persistentVolumeClaim:
            claimName: dawarich-pvc-public
        - name: storage
          persistentVolumeClaim:
            claimName: dawarich-pvc-storage
