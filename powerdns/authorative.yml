---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: powerdns-authorative-nameserver
  labels:
    app.kubernetes.io/name: authorative-nameserver
    app.kubernetes.io/part-of: powerdns
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: authorative-nameserver
      app.kubernetes.io/part-of: powerdns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authorative-nameserver
        app.kubernetes.io/part-of: powerdns
    spec:
      containers:
      - name: powerdns-authorative
        image: powerdns/pdns-auth-50:5.0.3
        volumeMounts:
          - name: config
            mountPath: /etc/powerdns/pdns.conf
            subPath: pdns.conf
          - name: records
            mountPath: /etc/powerdns/zones
        ports:
          - containerPort: 53
            protocol: UDP
          - containerPort: 53
            protocol: TCP
      volumes:
      - name: config
        configMap:
          name: powerdns-authorative-config
      - name: records
        configMap:
          name: dns-records
---
apiVersion: v1
kind: Service
metadata:
  name: powerdns-authorative-nameserver
spec:
  selector:
    app.kubernetes.io/name: authorative-nameserver
    app.kubernetes.io/part-of: powerdns
  ports:
    - protocol: UDP
      port: 53
      targetPort: 53
  type: LoadBalancer
