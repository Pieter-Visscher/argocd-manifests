---
apiVersion: awx.ansible.com/v1beta1
kind: AWX
metadata:
  namespace: awx
  name: awx
spec:
  service_type: LoadBalancer
  postgres_data_volume_init: true
  admin_password_secret: bitwarden-awx-admin-password
  feature_flags:
    FEATURE_POLICY_AS_CODE_ENABLED: true
  extra_settings:
    - name: POLICY_SERVICE_URL
      # Path matches: /v1/data/<package_name>/<rule_name>
      value: "'http://opa.opa.svc.cluster.local:8181/v1/data/aap_policy_examples/organization_inventory_validation'"
    - name: POLICY_SERVICE_TOKEN
      value: "''"  # Leave empty if you haven't configured OPA authentication
