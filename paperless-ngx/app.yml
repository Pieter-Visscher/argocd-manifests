---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx-broker
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: paperless-ngx
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: redis
        image: docker.io/library/redis:8
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redisdata
          mountPath: /data
      volumes:
        - name: redisdata
          persistentVolumeClaim:
            claimName: paperless-ngx-pvc-redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: paperless-ngx-mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/part-of: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mariadb
      app.kubernetes.io/part-of: paperless-ngx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/part-of: paperless-ngx
    spec:
      containers:
      - name: mariadb
        image: docker.io/library/mariadb:11
        ports:
        - containerPort: 3306
        env:
        - name: MARIADB_DATABASE
          valueFrom:
            configMapKeyRef:
              name: paperless-ngx-configmap-mariadb
              key: database
        - name: MARIADB_USER
          valueFrom:
            configMapKeyRef:
              name: paperless-ngx-configmap-mariadb
              key: user 
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: paperless-ngx-secret-mariadb
              key: password
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: paperless-ngx-secret-mariadb
              key: root_password
        volumeMounts:
        - name: dbdata
          mountPath: /var/lib/mysql
      volumes:
        - name: dbdata
          persistentVolumeClaim:
            claimName: paperless-ngx-pvc-mariadb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ngx
  labels:
    app.kubernetes.io/name: paperless-ngx
    app.kubernetes.io/part-of: paperless-ngx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless-ngx
      app.kubernetes.io/part-of: paperless-ngx
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless-ngx
        app.kubernetes.io/part-of: paperless-ngx
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
      - name: wait-for-db
        image: busybox:1.35
        env:
          - name: PAPERLESS_DBHOST
            value: "paperless-ngx-svc-mariadb"
          - name: PAPERLESS_DBPORT
            value: "3306"
        command:
          - sh
          - -c
          - |
            echo "Waiting for MariaDB at $PAPERLESS_DBHOST:$PAPERLESS_DBPORT..."
            RETRIES=30
            until nc -z -w 3 $PAPERLESS_DBHOST $PAPERLESS_DBPORT; do
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -le 0 ]; then
                echo "ERROR: Could not reach MariaDB at $PAPERLESS_DBHOST:$PAPERLESS_DBPORT"
                exit 1
              fi
              echo "Waiting for MariaDB... retries left: $RETRIES"
              sleep 5
            done
            echo "MariaDB is reachable!"
      - name: wait-for-redis
        image: busybox:1.35
        env:
          - name: PAPERLESS_REDIS
            value: "redis://paperless-ngx-svc-redis"
        command:
          - sh
          - -c
          - |
            # Extract host and port from redis URL (redis://host:port)
            REDIS_URL=${PAPERLESS_REDIS}
            # Remove protocol prefix
            REDIS_HOST_PORT=${REDIS_URL#redis://}
            # If port not specified, default to 6379
            REDIS_HOST=$(echo $REDIS_HOST_PORT | cut -d':' -f1)
            REDIS_PORT=$(echo $REDIS_HOST_PORT | cut -s -d':' -f2)
            if [ -z "$REDIS_PORT" ]; then
              REDIS_PORT=6379
            fi
            echo "Waiting for Redis at $REDIS_HOST:$REDIS_PORT..."
            RETRIES=30
            until nc -z -w 3 $REDIS_HOST $REDIS_PORT; do
              RETRIES=$((RETRIES - 1))
              if [ $RETRIES -le 0 ]; then
                echo "ERROR: Could not reach Redis at $REDIS_HOST:$REDIS_PORT"
                exit 1
              fi
              echo "Waiting for Redis... retries left: $RETRIES"
              sleep 5
            done
            echo "Redis is reachable!"
      containers:
      - name: paperless-ngx
        image: ghcr.io/paperless-ngx/paperless-ngx:2.20.6
        ports:
        - containerPort: 8000
        env:
        - name: PAPERLESS_OUTLOOK_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: paperless-ngx-secret
              key: oauth_password
        - name: PAPERLESS_OUTLOOK_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: paperless-ngx-secret
              key: oauth_application_id
        - name: PAPERLESS_OAUTH_CALLBACK_BASE_URL
          value: https://paperless.pieter.fish
        - name: PAPERLESS_URL
          value: "https://paperless.nauvis.lan"
        - name: PAPERLESS_REDIS
          value: "redis://paperless-ngx-svc-redis"
        - name: PAPERLESS_DBENGINE
          value: "mariadb"
        - name: PAPERLESS_DBHOST
          value: "paperless-ngx-svc-mariadb"
        - name: PAPERLESS_DBPORT
          value: "3306"
        - name: PAPERLESS_DBUSER
          valueFrom:
            configMapKeyRef:
              name: paperless-ngx-configmap-mariadb
              key: user
        - name: PAPERLESS_DBPASS
          valueFrom:
            secretKeyRef:
              name: paperless-ngx-secret-mariadb
              key: password
        volumeMounts:
        - name: data
          mountPath: /usr/src/paperless/data
        - name: media
          mountPath: /usr/src/paperless/media
        - name: export
          mountPath: /usr/src/paperless/export
        - name: consume
          mountPath: /usr/src/paperless/consume
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: paperless-ngx-pvc-data
        - name: media
          persistentVolumeClaim:
            claimName: paperless-ngx-pvc-media
        - name: consume
          emptyDir:
            sizeLimit: 1Gi
        - name: export
          emptyDir:
            sizeLimit: 1Gi
